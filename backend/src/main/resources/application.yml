spring:
  profiles:
    active: dev
  application:
    name: xjicloud-backend
  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 2GB
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

xjicloud:
  jwt:
    secret: change-me-in-production-use-at-least-32-chars-long-secret-key
    expiration-ms: 86400000
  storage:
    root: ./data/xjicloud
  cors:
    allowed-origins: http://127.0.0.1:5174,http://localhost:5174,http://127.0.0.1:5175,http://localhost:5175
  oss:
    endpoint: ${OSS_ENDPOINT:http://127.0.0.1:9000}
    region: ${OSS_REGION:us-east-1}
    bucket: ${OSS_BUCKET:xjicloud}
    access-key: ${OSS_ACCESS_KEY:minioadmin}
    secret-key: ${OSS_SECRET_KEY:minioadmin}
    path-style-access: true
    presign-expiration-minutes: 120
  redis:
    queue-key: xjicloud:jobs
  worker:
    shared-secret: change-me-worker-secret-in-production
    heartbeat-timeout-sec: 60
    poll-timeout-sec: 25
  admin:
    default-username: admin
    default-password: admin123
    # 为 true 时，每次启动将 yml 中的 default-password 同步到已存在的同名管理员（改密后需重启）
    sync-password-on-startup: false
  framework:
    enabled: false
    master-url: http://127.0.0.1:9090
    api-secret: change-me-framework-api-secret
    backend-api-secret: change-me-backend-api-secret
    config-poll-interval-sec: 60

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:file:./data/xjicloud-db;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://localhost:5432/xjicloud
    username: xjicloud
    password: xjicloud
  jpa:
    hibernate:
      ddl-auto: validate
