spring:
  profiles:
    active: dev
  application:
    name: xjicloud-backend
  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 2GB
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

xjicloud:
  jwt:
    secret: change-me-in-production-use-at-least-32-chars-long-secret-key
    expiration-ms: 86400000
  storage:
    root: ./data/xjicloud
  cors:
    allowed-origins: http://127.0.0.1:5174,http://localhost:5174

management:
  endpoints:
    web:
      exposure:
        include: health,info

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:file:./data/xjicloud-db;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://localhost:5432/xjicloud
    username: xjicloud
    password: xjicloud
  jpa:
    hibernate:
      ddl-auto: validate
