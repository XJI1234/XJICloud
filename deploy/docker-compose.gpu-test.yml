services:
  gpu-worker-test:
    build:
      context: ../gpu-worker
      dockerfile: Dockerfile.test
      network: host
    volumes:
      - ../gpu-worker/testdata/input:/input:ro
      - ../gpu-worker/testdata/output:/output
    environment:
      INPUT_ZIP: /input/south-building.zip
      COLMAP_SINGLE_CAMERA: "0"
      COLMAP_USE_GPU: "1"
      EXPORT_PLY: "0"
