# 复制为 secrets.yaml 后修改（secrets.yaml 已 gitignore，勿提交）
# cp deploy/k8s/secrets.example.yaml deploy/k8s/secrets.yaml
apiVersion: v1
kind: Secret
metadata:
  name: xjicloud-secrets
  namespace: xjicloud
type: Opaque
stringData:
  POSTGRES_USER: xjicloud
  POSTGRES_PASSWORD: change-me-postgres
  POSTGRES_DB: xjicloud
  XJICLOUD_JWT_SECRET: change-me-in-production-use-at-least-32-chars-long-secret-key
  XJICLOUD_WORKER_SECRET: change-me-worker-secret-in-production
  OSS_ACCESS_KEY: minioadmin
  OSS_SECRET_KEY: minioadmin
  XJICLOUD_ADMIN_PASSWORD: admin123
