apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: xjicloud
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      nodeSelector:
        xjicloud.io/role-edge: "true"
      containers:
        - name: frontend
          image: xjicloud/frontend:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 500m
