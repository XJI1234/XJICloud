apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: xjicloud
  namespace: xjicloud
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: cloud.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
  tls:
    - hosts:
        - cloud.example.com
      secretName: xjicloud-tls
