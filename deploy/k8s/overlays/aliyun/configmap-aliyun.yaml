apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: xjicloud
data:
  SPRING_PROFILES_ACTIVE: prod
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  OSS_REGION: cn-hangzhou
  OSS_BUCKET: your-production-bucket
  OSS_ENDPOINT: https://oss-cn-hangzhou.aliyuncs.com
  XJICLOUD_CORS_ORIGINS: https://cloud.example.com
  XJICLOUD_STORAGE_ROOT: /data/xjicloud
  XJICLOUD_ADMIN_USERNAME: admin
