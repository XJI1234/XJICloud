# 复制为 secrets.yaml 后修改（勿提交）
# cp secrets.example.yaml secrets.yaml
apiVersion: v1
kind: Secret
metadata:
  name: xjicloud-secrets
  namespace: xjicloud
type: Opaque
stringData:
  # RDS PostgreSQL
  POSTGRES_USER: xjicloud
  POSTGRES_PASSWORD: change-me-rds
  POSTGRES_DB: xjicloud
  SPRING_DATASOURCE_URL: jdbc:postgresql://rm-xxxxx.pg.rds.aliyuncs.com:5432/xjicloud
  # 安全
  XJICLOUD_JWT_SECRET: replace-with-long-random-secret-at-least-32-chars
  XJICLOUD_WORKER_SECRET: replace-with-worker-shared-secret
  # 阿里云 OSS RAM 子账号
  OSS_ACCESS_KEY: your-ram-access-key
  OSS_SECRET_KEY: your-ram-secret-key
  XJICLOUD_ADMIN_PASSWORD: change-me-after-first-login
