apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: xjicloud

resources:
  - namespace.yaml
  - secrets.yaml
  - configmap-backend.yaml
  - redis/deployment.yaml
  - redis/service.yaml
  - postgres/statefulset.yaml
  - postgres/service.yaml
  - minio/statefulset.yaml
  - minio/service.yaml
  - minio/init-job.yaml
  - backend/pvc.yaml
  - backend/deployment.yaml
  - backend/service.yaml
  - gpu-worker/deployment.yaml
  - frontend/deployment.yaml
  - frontend/service.yaml
  - ingress.yaml

images:
  - name: xjicloud/backend
    newName: xjicloud/backend
    newTag: local
  - name: xjicloud/gpu-worker
    newName: xjicloud/gpu-worker
    newTag: local
  - name: xjicloud/frontend
    newName: xjicloud/frontend
    newTag: local
