apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: xjicloud
  namespace: xjicloud
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: ""
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
